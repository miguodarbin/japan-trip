<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本旅行 2024 | 极简助手</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS CDN: 用于实现丝滑的拖拽排序 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --apple-bg: #FFFFFF;
            --apple-text: #000000;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .modal-enter { animation: slideIn 0.3s cubic-bezier(0.32, 1, 0.23, 1) forwards; }
        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        
        /* 编辑状态反馈 */
        .editing-mode [contenteditable="true"] {
            outline: none;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            padding: 2px 8px;
        }
        
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
        .tab-active { background: #000; color: #fff; transform: scale(1.05); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); }

        /* 高亮颜色 */
        .high-yellow { background-color: #FACC15; color: #000; }
        .high-red { background-color: #FB7185; color: #fff; }
        .high-blue { background-color: #60A5FA; color: #fff; }
        .high-green { background-color: #4ADE80; color: #000; }
        .high-none { background-color: #F9FAFB; color: #000; border: 1px solid #F3F4F6; }

        /* 拖拽时的样式 */
        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
        .sortable-drag { cursor: grabbing; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-yellow-200 pb-10">

    <!-- 顶栏：全新文字版入口 -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 h-16 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <!-- 计算器、看板、口语全部移动到左侧并改为纯文字 -->
            <button onclick="openCalc()" class="text-xs font-bold text-gray-400 hover:text-black transition-colors">汇率换算</button>
            <button onclick="openDashboard()" class="text-xs font-bold text-gray-400 hover:text-black transition-colors">开销看板</button>
            <button onclick="openPhrases()" class="text-xs font-bold text-gray-400 hover:text-black transition-colors">常用口语</button>
        </div>
        <div class="flex items-center space-x-3">
            <button id="reset-btn" onclick="openResetModal()" class="hidden text-xs font-bold px-4 py-2 rounded-full border border-red-500 text-red-500 transition-all active:bg-red-500 active:text-white">重置数据</button>
            <button onclick="toggleEditMode()" id="edit-mode-btn" class="text-xs font-bold px-4 py-2 rounded-full border border-black transition-all">进入编辑模式</button>
        </div>
    </header>

    <main class="pt-20 px-6" id="app">
        <!-- Tabs 区域：通过增加 py 解决切边问题 -->
        <div class="sticky top-16 z-30 -mx-6 px-6 bg-white overflow-hidden">
            <div id="date-tabs" class="flex gap-3 overflow-x-auto no-scrollbar items-start py-6">
                <!-- 由 JS 渲染选项卡 -->
            </div>
        </div>

        <!-- 内容区域 -->
        <div id="day-content" class="mt-4"></div>
    </main>

    <!-- 1. 开销看板 -->
    <div id="dashboard-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeDashboard()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl overflow-y-auto max-h-[80vh]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold">费用清单</h3>
                <button onclick="closeDashboard()" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <div class="p-6 bg-blue-600 rounded-[2.5rem] mb-8 text-white shadow-xl">
                <p class="text-xs font-bold opacity-70 uppercase mb-1">人民币总计</p>
                <p id="total-cny-only" class="text-4xl font-black">0.00</p>
            </div>
            <div class="space-y-4" id="category-summary-cny"></div>
        </div>
    </div>

    <!-- 2. 汇率换算器 -->
    <div id="calc-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeCalc()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">汇率换算</h3>
                <button onclick="closeCalc()" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <div class="space-y-4">
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <p class="text-[10px] font-bold text-gray-400 mb-1">日元 JPY</p>
                    <input id="calc-jpy" type="number" placeholder="0" oninput="convert('jpy')" class="w-full bg-transparent text-3xl font-bold outline-none">
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <p class="text-[10px] font-bold text-gray-400 mb-1">人民币 CNY</p>
                    <input id="calc-cny" type="number" placeholder="0" oninput="convert('cny')" class="w-full bg-transparent text-3xl font-bold outline-none text-blue-600">
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 行程编辑 Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-end">
        <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
        <div class="relative w-full bg-white rounded-t-[40px] p-8 modal-enter max-h-[90vh] overflow-y-auto pb-12">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-bold mb-6 italic text-black">编辑行程</h3>
            <div class="space-y-4 mb-8">
                <div class="grid grid-cols-2 gap-3">
                    <input id="in-time" type="text" placeholder="时间" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                    <input id="in-place" type="text" placeholder="地点" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                </div>
                <input id="in-task" type="text" placeholder="内容" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                <div class="flex gap-3">
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl flex items-center"><span class="mr-2 text-gray-400 font-bold">¥</span><input id="in-cost" type="number" placeholder="日元金额" class="w-full bg-transparent font-bold outline-none"></div>
                    <select id="in-cat" class="bg-gray-50 p-4 rounded-2xl font-bold outline-none"><option value="">分类</option><option value="🍱 餐饮">🍱 餐饮</option><option value="🚄 交通">🚄 交通</option><option value="🏨 酒店">🏨 酒店</option><option value="🛍️ 购物">🛍️ 购物</option><option value="🎫 门票">🎫 门票</option></select>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 mb-3 uppercase">选择配色</p>
                    <div class="flex gap-4">
                        <button onclick="selectColor('none')" id="col-none" class="w-10 h-10 rounded-full border-2 border-gray-100 bg-white"></button>
                        <button onclick="selectColor('yellow')" id="col-yellow" class="w-10 h-10 rounded-full bg-[#FACC15]"></button>
                        <button onclick="selectColor('red')" id="col-red" class="w-10 h-10 rounded-full bg-[#FB7185]"></button>
                        <button onclick="selectColor('blue')" id="col-blue" class="w-10 h-10 rounded-full bg-[#60A5FA]"></button>
                        <button onclick="selectColor('green')" id="col-green" class="w-10 h-10 rounded-full bg-[#4ADE80]"></button>
                    </div>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="deleteCurrentEvent()" id="del-btn" class="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-bold hidden">删除条目</button>
                <button onclick="saveEvent()" class="flex-[2] py-4 bg-black text-white rounded-2xl font-bold">保存</button>
            </div>
        </div>
    </div>

    <!-- 4. 常用口语面板 -->
    <div id="phrase-panel" class="hidden fixed inset-0 z-50 flex items-end">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closePhrases()"></div>
        <div class="relative w-full bg-white rounded-t-[40px] p-8 modal-enter h-[80vh] flex flex-col">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">常用口语</h3>
                <button onclick="toggleAddPhrase()" class="text-sm font-bold bg-gray-100 px-4 py-2 rounded-full">新增</button>
            </div>
            <div id="add-phrase-box" class="hidden mb-6 p-4 bg-gray-50 rounded-3xl space-y-3">
                <input id="new-zh" type="text" placeholder="中文" class="w-full p-3 bg-white rounded-xl font-bold outline-none">
                <input id="new-jp" type="text" placeholder="日语" class="w-full p-3 bg-white rounded-xl font-bold outline-none">
                <input id="new-en" type="text" placeholder="注音" class="w-full p-3 bg-white rounded-xl font-bold outline-none">
                <button onclick="addNewPhrase()" class="w-full py-3 bg-black text-white rounded-xl font-bold">加入面板</button>
            </div>
            <div id="phrase-list" class="flex-1 overflow-y-auto space-y-3 pb-10 text-black"></div>
        </div>
    </div>

    <!-- 重置确认 Modal -->
    <div id="reset-confirm-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeResetModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl border-4 border-red-500/20">
            <h3 class="text-2xl font-bold mb-4 text-red-500">确认重置？</h3>
            <p class="text-gray-500 text-sm mb-6 leading-relaxed">此操作将清空所有已编辑的行程和口语。确认请在下方输入 <span class="font-bold text-black bg-yellow-200 px-1">ok</span>：</p>
            <input id="reset-verify-input" type="text" placeholder="输入 ok" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none mb-6 border-2 border-transparent focus:border-red-500 transition-all">
            <div class="flex gap-3">
                <button onclick="closeResetModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">取消</button>
                <button onclick="executeReset()" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-bold shadow-lg shadow-red-200">确认清空</button>
            </div>
        </div>
    </div>

    <!-- 翻译闪卡 -->
    <div id="flash-modal" class="hidden fixed inset-0 z-[60] bg-black flex flex-col items-center justify-center p-10 text-center" onclick="this.classList.add('hidden')">
        <div class="modal-enter"><p id="f-en" class="text-gray-500 text-lg mb-4 font-bold uppercase"></p><h2 id="f-jp" class="text-white text-5xl font-bold mb-8"></h2><p id="f-zh" class="text-gray-400 text-xl"></p></div>
    </div>

    <!-- 新增日期 Modal -->
    <div id="add-day-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="this.parentElement.classList.add('hidden')"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 italic text-black">新增行程日期</h3>
            <div class="space-y-4">
                <input id="new-day-date" type="text" placeholder="完整日期 (如 4月27日)" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                <input id="new-day-short" type="text" placeholder="简写 (如 4.27)" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                <select id="new-day-week" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                    <option value="周一">周一</option><option value="周二">周二</option><option value="周三">周三</option><option value="周四">周四</option><option value="周五">周五</option><option value="周六">周六</option><option value="周日">周日</option>
                </select>
                <input id="new-day-loc" type="text" placeholder="地点 (如 东京)" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
            </div>
            <button onclick="confirmAddDay()" class="w-full mt-6 py-4 bg-black text-white rounded-2xl font-bold">确认添加</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[110] bg-black/90 text-white px-8 py-3 rounded-full text-xs font-bold shadow-2xl">操作成功</div>

    <script>
        // --- 默认毛坯配置 ---
        const DEFAULT_ITINERARY = [
            { date: '4月18日', short: '4.18', day: '周四', loc: '未设定', events: [] }
        ];
        const DEFAULT_PHRASES = [];

        // --- 状态管理 ---
        let itinerary = JSON.parse(JSON.stringify(DEFAULT_ITINERARY));
        let phrases = [...DEFAULT_PHRASES];
        let isEditMode = false;
        let activeDayIndex = 0; 
        let activeEditEventIndex = null;
        let selectedColor = 'none';
        let sortableInstance = null;
        const RATE = 0.048;

        function render() {
            renderTabs();
            renderDayContent();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('date-tabs');
            tabsContainer.innerHTML = '';
            
            itinerary.forEach((day, index) => {
                const tab = document.createElement('div');
                // 增加 pt 和 pr 空间
                tab.className = "relative flex-shrink-0 pt-3 pr-3";
                
                const tabBtn = document.createElement('div');
                tabBtn.onclick = () => { activeDayIndex = index; render(); };
                tabBtn.className = `px-6 py-3 rounded-2xl text-center cursor-pointer transition-all ${activeDayIndex === index ? 'tab-active' : 'bg-gray-50 text-gray-400 font-bold'}`;
                tabBtn.innerHTML = `<p class="text-[10px] font-bold">${day.day}</p><p class="text-lg font-bold">${day.short}</p>`;
                
                if (isEditMode) {
                    const delDayBtn = document.createElement('button');
                    // 叉号位置精确微调
                    delDayBtn.className = "absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-[12px] flex items-center justify-center shadow-lg z-10 font-bold border-2 border-white";
                    delDayBtn.innerHTML = "×";
                    delDayBtn.onclick = (e) => { e.stopPropagation(); deleteDay(index); };
                    tab.appendChild(delDayBtn);
                }
                
                tab.appendChild(tabBtn);
                tabsContainer.appendChild(tab);
            });

            if (isEditMode) {
                const addBtn = document.createElement('button');
                addBtn.className = "flex-shrink-0 w-12 h-12 mt-3 flex items-center justify-center bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl text-gray-300 text-2xl ml-2";
                addBtn.innerHTML = "+";
                addBtn.onclick = () => document.getElementById('add-day-modal').classList.remove('hidden');
                tabsContainer.appendChild(addBtn);
            }
        }

        function renderDayContent() {
            const container = document.getElementById('day-content');
            if (itinerary.length === 0) {
                container.innerHTML = '<div class="py-20 text-center text-gray-300 font-bold italic">进入编辑模式添加日期</div>';
                return;
            }
            const day = itinerary[activeDayIndex];
            container.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-bold text-black">${day.date}</h2>
                        <p class="text-xs font-bold text-gray-400 mt-1">地点：<span id="loc-editable" oninput="updateLoc(this.innerText)" contenteditable="${isEditMode}">${day.loc}</span></p>
                    </div>
                    ${isEditMode ? `<button onclick="openEditor(${activeDayIndex})" class="w-10 h-10 flex items-center justify-center bg-black text-white rounded-xl font-bold shadow-lg shadow-black/20 text-xl">+</button>` : ''}
                </div>
                <div class="space-y-4" id="events-list"></div>
            `;
            const list = document.getElementById('events-list');
            if (day.events.length === 0) {
                list.innerHTML = `<div class="py-10 text-center bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-100 font-bold text-gray-200">${isEditMode ? '新增行程条目' : '暂无行程记录'}</div>`;
            } else {
                list.innerHTML = day.events.map((ev, eIdx) => `
                    <div data-index="${eIdx}" onclick="openEditor(${activeDayIndex}, ${eIdx})" class="event-card relative flex items-center p-5 rounded-[2rem] transition-all active:scale-[0.98] high-${ev.color || 'none'} text-black shadow-sm border border-gray-50">
                        ${isEditMode ? `
                        <div class="mr-3 text-gray-300 opacity-50 flex-shrink-0">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </div>` : ''}
                        <div class="min-w-[65px] flex-shrink-0 text-lg font-bold">${ev.time}</div>
                        <div class="ml-4 flex-1 overflow-hidden">
                            <div class="flex justify-between items-center mb-0.5"><p class="text-[10px] font-bold opacity-60 truncate">${ev.place}</p>${ev.cost > 0 ? `<span class="text-[9px] font-black bg-white/30 px-2 py-0.5 rounded-full flex-shrink-0">¥${ev.cost}</span>` : ''}</div>
                            <p class="text-base font-bold truncate">${ev.task}</p>
                            ${ev.cat ? `<div class="mt-1"><span class="text-[8px] font-bold bg-black text-white px-2 py-0.5 rounded-md">${ev.cat}</span></div>` : ''}
                        </div>
                    </div>
                `).join('');

                if (isEditMode) initSortable();
            }
        }

        function initSortable() {
            const el = document.getElementById('events-list');
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = Sortable.create(el, {
                animation: 250,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                handle: '.event-card',
                onEnd: function (evt) {
                    const dayEvents = itinerary[activeDayIndex].events;
                    const movedItem = dayEvents.splice(evt.oldIndex, 1)[0];
                    dayEvents.splice(evt.newIndex, 0, movedItem);
                    renderDayContent();
                }
            });
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('edit-mode-btn').innerText = isEditMode ? '完成预览' : '进入编辑模式';
            document.getElementById('reset-btn').classList.toggle('hidden', !isEditMode);
            if (!isEditMode && sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
            render();
        }

        function openResetModal() {
            document.getElementById('reset-verify-input').value = '';
            document.getElementById('reset-confirm-modal').classList.remove('hidden');
        }
        function closeResetModal() { document.getElementById('reset-confirm-modal').classList.add('hidden'); }
        function executeReset() {
            const input = document.getElementById('reset-verify-input').value.trim().toLowerCase();
            if (input === 'ok') {
                itinerary = JSON.parse(JSON.stringify(DEFAULT_ITINERARY));
                phrases = [...DEFAULT_PHRASES];
                activeDayIndex = 0;
                showToast("数据已恢复默认");
                closeResetModal();
                render();
            } else { showToast("请输入 ok 确认"); }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 1500);
        }

        function deleteDay(idx) {
            if (confirm('确认删除这一整天的行程吗？')) {
                itinerary.splice(idx, 1);
                activeDayIndex = Math.max(0, activeDayIndex - 1);
                render();
            }
        }

        function confirmAddDay() {
            const date = document.getElementById('new-day-date').value;
            const short = document.getElementById('new-day-short').value;
            const week = document.getElementById('new-day-week').value;
            const loc = document.getElementById('new-day-loc').value;
            if (date && short) {
                itinerary.push({ date, short, day: week, loc, events: [] });
                document.getElementById('add-day-modal').classList.add('hidden');
                activeDayIndex = itinerary.length - 1;
                render();
            }
        }

        function openDashboard() {
            let totalCNY = 0; let catCNY = {};
            itinerary.forEach(day => day.events.forEach(ev => {
                const c = (parseInt(ev.cost) || 0) * RATE; totalCNY += c;
                if (ev.cat) catCNY[ev.cat] = (catCNY[ev.cat] || 0) + c;
            }));
            document.getElementById('total-cny-only').innerText = '¥ ' + totalCNY.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('category-summary-cny').innerHTML = Object.keys(catCNY).map(cat => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl"><span class="font-bold text-black">${cat}</span><span class="font-black text-blue-600">¥ ${catCNY[cat].toFixed(2)}</span></div>`).join('');
            document.getElementById('dashboard-modal').classList.remove('hidden');
        }

        function closeDashboard() { document.getElementById('dashboard-modal').classList.add('hidden'); }
        function openCalc() { document.getElementById('calc-modal').classList.remove('hidden'); }
        function closeCalc() { document.getElementById('calc-modal').classList.add('hidden'); }
        function convert(s) {
            const j = document.getElementById('calc-jpy'), c = document.getElementById('calc-cny');
            if (s === 'jpy') c.value = j.value ? (j.value * RATE).toFixed(2) : '';
            else j.value = c.value ? (c.value / RATE).toFixed(0) : '';
        }

        function openEditor(dIdx, eIdx = null) {
            if (!isEditMode) return;
            activeEditEventIndex = eIdx;
            const ev = eIdx !== null ? itinerary[dIdx].events[eIdx] : null;
            document.getElementById('in-time').value = ev ? ev.time : '';
            document.getElementById('in-place').value = ev ? ev.place : '';
            document.getElementById('in-task').value = ev ? ev.task : '';
            document.getElementById('in-cost').value = ev ? ev.cost : '';
            document.getElementById('in-cat').value = ev ? ev.cat : '';
            selectColor(ev ? (ev.color || 'none') : 'none');
            document.getElementById('del-btn').classList.toggle('hidden', ev === null);
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function selectColor(color) {
            selectedColor = color;
            ['none', 'yellow', 'red', 'blue', 'green'].forEach(c => document.getElementById('col-' + c).classList.remove('ring-4', 'ring-black'));
            document.getElementById('col-' + color).classList.add('ring-4', 'ring-black');
        }

        function saveEvent() {
            const newEv = {
                time: document.getElementById('in-time').value || '--:--',
                place: document.getElementById('in-place').value || '未知',
                task: document.getElementById('in-task').value || '计划',
                cost: parseInt(document.getElementById('in-cost').value) || 0,
                cat: document.getElementById('in-cat').value,
                color: selectedColor
            };
            if (activeEditEventIndex !== null) itinerary[activeDayIndex].events[activeEditEventIndex] = newEv;
            else itinerary[activeDayIndex].events.push(newEv);
            closeModal(); render();
        }

        function deleteCurrentEvent() { itinerary[activeDayIndex].events.splice(activeEditEventIndex, 1); closeModal(); render(); }
        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        function updateLoc(v) { itinerary[activeDayIndex].loc = v; }

        function openPhrases() { renderPhrases(); document.getElementById('phrase-panel').classList.remove('hidden'); }
        function closePhrases() { document.getElementById('phrase-panel').classList.add('hidden'); }
        function renderPhrases() {
            const list = document.getElementById('phrase-list');
            list.innerHTML = phrases.length === 0 ? '<p class="text-gray-300 text-center py-10 font-bold italic">点击上方新增常用语</p>' : 
                phrases.map((p, idx) => `<div class="flex gap-2"><div onclick="showFlashcard('${p.zh}','${p.jp}','${p.en}')" class="flex-1 p-5 bg-gray-50 rounded-2xl flex justify-between items-center btn-active"><div><p class="text-[10px] text-gray-400 font-bold uppercase mb-1 text-left">${p.en}</p><p class="text-lg font-bold text-left">${p.zh}</p></div><div class="text-2xl opacity-10">→</div></div><button onclick="deletePhrase(${idx})" class="w-12 bg-red-50 text-red-500 rounded-2xl font-bold btn-active">🗑️</button></div>`).join('');
        }
        function deletePhrase(i) { phrases.splice(i, 1); renderPhrases(); }
        function toggleAddPhrase() { document.getElementById('add-phrase-box').classList.toggle('hidden'); }
        function addNewPhrase() {
            const zh = document.getElementById('new-zh').value, jp = document.getElementById('new-jp').value, en = document.getElementById('new-en').value;
            if (zh && jp) { phrases.unshift({ zh, jp, en: en || 'USER' }); document.getElementById('new-zh').value = ''; document.getElementById('new-jp').value = ''; document.getElementById('new-en').value = ''; toggleAddPhrase(); renderPhrases(); }
        }
        function showFlashcard(zh, jp, en) { document.getElementById('f-zh').innerText = zh; document.getElementById('f-jp').innerText = jp; document.getElementById('f-en').innerText = en; document.getElementById('flash-modal').classList.remove('hidden'); }

        window.onload = render;
    </script>
</body>
</html>
