<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日本旅行 2024 | 极简助手</title>
    
    <!-- iOS PWA 适配 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日本行">
    
    <!-- Tailwind CSS & SortableJS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root { --apple-bg: #FFFFFF; --apple-text: #000000; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            -webkit-tap-highlight-color: transparent;
        }

        button, .btn-active, .event-card, #date-tabs div { user-select: none; -webkit-user-select: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .modal-enter { animation: slideIn 0.3s cubic-bezier(0.32, 1, 0.23, 1) forwards; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
        .tab-active { background: #000; color: #fff; transform: scale(1.05); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2); }

        /* 高亮颜色 */
        .high-yellow { background-color: #FACC15; }
        .high-red { background-color: #FB7185; color: #fff; }
        .high-blue { background-color: #60A5FA; color: #fff; }
        .high-green { background-color: #4ADE80; }
        .high-none { background-color: #F9FAFB; border: 1px solid #F3F4F6; }

        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }

        /* 图片预览遮罩 */
        #img-viewer { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="selection:bg-yellow-200 text-black">

    <!-- 顶栏 -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 flex items-center justify-between" 
            style="padding-top: env(safe-area-inset-top, 0px); height: calc(4.5rem + env(safe-area-inset-top, 0px));">
        <div class="flex items-center space-x-4">
            <button onclick="openCalc()" class="text-xs font-bold text-gray-400">汇率</button>
            <button onclick="openDashboard()" class="text-xs font-bold text-gray-400">看板</button>
            <button onclick="openPhrases()" class="text-xs font-bold text-gray-400">口语</button>
            <button onclick="openMemoryStats()" class="text-xs font-bold text-blue-400">内存</button>
        </div>
        <div class="flex items-center space-x-2">
            <button id="reset-btn" onclick="openResetModal()" class="hidden text-[10px] font-bold px-3 py-1.5 rounded-full border border-red-500 text-red-500 transition-all">重置</button>
            <button onclick="toggleEditMode()" id="edit-mode-btn" class="text-xs font-bold px-4 py-2 rounded-full border border-black transition-all">进入编辑</button>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="px-6" id="app" style="padding-top: calc(5rem + env(safe-area-inset-top, 0px));">
        <!-- Tabs 区域 -->
        <div class="sticky z-30 -mx-6 bg-white" style="top: calc(4.5rem + env(safe-area-inset-top, 0px));">
            <div id="date-tabs" class="flex gap-4 overflow-x-auto no-scrollbar items-center py-8 px-6">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
        <div id="day-content" class="mt-2"></div>
    </main>

    <!-- 弹窗：看板 -->
    <div id="dashboard-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeDashboard()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl overflow-y-auto max-h-[80vh]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold">费用清单</h3>
                <button onclick="closeDashboard()" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <div class="p-6 bg-blue-600 rounded-[2.5rem] mb-8 text-white shadow-xl shadow-blue-100">
                <p class="text-xs font-bold opacity-70 uppercase mb-1">人民币总计</p>
                <p id="total-cny-only" class="text-4xl font-black">0.00</p>
            </div>
            <div id="category-summary-cny" class="space-y-4"></div>
        </div>
    </div>

    <!-- 弹窗：内存看板 -->
    <div id="memory-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeMemoryStats()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">存储空间</h3>
                <button onclick="closeMemoryStats()" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <div class="space-y-6">
                <div class="p-6 bg-gray-50 rounded-3xl text-black">
                    <p class="text-xs text-gray-400 font-bold mb-2">已用容量</p>
                    <p id="memory-used" class="text-3xl font-black">0 KB</p>
                    <div class="w-full h-2 bg-gray-200 rounded-full mt-4 overflow-hidden">
                        <div id="memory-bar" class="h-full bg-blue-500 transition-all" style="width: 0%"></div>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-2">上限 5MB (iOS 标准)</p>
                </div>
                <p class="text-xs text-gray-400 leading-relaxed">
                    Gemini 大王提示：图片已被压缩至 800px 以节省空间。请在此进度条接近 100% 时清理无用行程。
                </p>
            </div>
        </div>
    </div>

    <!-- 弹窗：行程编辑 -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-end">
        <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
        <div class="relative w-full bg-white rounded-t-[40px] p-8 modal-enter max-h-[90vh] overflow-y-auto pb-12">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold italic">编辑项目</h3>
                <button onclick="closeModal()" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <div class="space-y-4 mb-8">
                <div class="grid grid-cols-2 gap-3">
                    <input id="in-time" type="text" placeholder="时间" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                    <input id="in-place" type="text" placeholder="地点" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                </div>
                <input id="in-task" type="text" placeholder="具体内容" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                
                <!-- 图片上传 -->
                <div class="p-4 bg-gray-50 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div id="img-preview-box" class="w-12 h-12 bg-gray-200 rounded-lg overflow-hidden flex items-center justify-center">
                            <span class="text-xs text-gray-400">🖼️</span>
                        </div>
                        <span id="img-status-text" class="text-xs font-bold text-gray-400">尚未添加图片</span>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="document.getElementById('img-input').click()" class="px-4 py-2 bg-white rounded-xl text-[10px] font-bold border border-gray-100">上传</button>
                        <button id="del-img-btn" onclick="clearSelectedImg()" class="hidden px-4 py-2 bg-red-50 text-red-500 rounded-xl text-[10px] font-bold">删除</button>
                    </div>
                    <input type="file" id="img-input" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                </div>

                <div class="flex gap-3">
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl flex items-center"><span class="mr-2 text-gray-400 font-bold">¥</span><input id="in-cost" type="number" placeholder="日元" class="w-full bg-transparent font-bold outline-none"></div>
                    <select id="in-cat" class="bg-gray-50 p-4 rounded-2xl font-bold outline-none"><option value="">分类</option><option value="🍱 餐饮">🍱 餐饮</option><option value="🚄 交通">🚄 交通</option><option value="🏨 酒店">🏨 酒店</option><option value="🛍️ 购物">🛍️ 购物</option><option value="🎫 门票">🎫 门票</option></select>
                </div>
                
                <div class="flex gap-4 justify-between pt-2">
                    <button onclick="selectColor('none')" id="col-none" class="w-10 h-10 rounded-full border-2 border-gray-100 bg-white"></button>
                    <button onclick="selectColor('yellow')" id="col-yellow" class="w-10 h-10 rounded-full bg-[#FACC15]"></button>
                    <button onclick="selectColor('red')" id="col-red" class="w-10 h-10 rounded-full bg-[#FB7185]"></button>
                    <button onclick="selectColor('blue')" id="col-blue" class="w-10 h-10 rounded-full bg-[#60A5FA]"></button>
                    <button onclick="selectColor('green')" id="col-green" class="w-10 h-10 rounded-full bg-[#4ADE80]"></button>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="deleteCurrentEvent()" id="del-btn" class="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-bold hidden">删除条目</button>
                <button onclick="saveEvent()" class="flex-[2] py-4 bg-black text-white rounded-2xl font-bold">保存更改</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：重置确认 -->
    <div id="reset-confirm-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 text-black">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeResetModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl">
            <h3 class="text-2xl font-bold mb-4 text-red-500 text-center">要清空吗？</h3>
            <p class="text-gray-500 text-sm mb-6 text-center leading-relaxed">确认请在下方输入 <span class="font-bold text-black px-1">ok</span>：</p>
            <input id="reset-verify-input" type="text" placeholder="输入 ok" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none mb-6 border-2 border-transparent focus:border-red-500 transition-all text-center uppercase tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeResetModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">取消</button>
                <button onclick="executeReset()" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-bold shadow-lg">确认</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：新增日期 -->
    <div id="add-day-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 text-black">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeAddDayModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold italic">新增日期</h3>
                <button onclick="closeAddDayModal()" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <div class="space-y-4">
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">选择具体日期</p>
                    <input id="new-day-picker" type="date" class="w-full bg-transparent font-bold outline-none">
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">地点 (如 大阪)</p>
                    <input id="new-day-loc" type="text" placeholder="东京" class="w-full bg-transparent font-bold outline-none">
                </div>
            </div>
            <button onclick="confirmAddDay()" class="w-full mt-8 py-4 bg-black text-white rounded-2xl font-bold">确认添加</button>
        </div>
    </div>

    <!-- 全屏图片查看器 -->
    <div id="img-viewer" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="viewer-content" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl">
    </div>

    <!-- 弹窗：汇率/常用语/闪卡保持原逻辑 -->
    <div id="calc-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 text-black">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeCalc()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[3rem] p-8 modal-enter shadow-2xl">
            <div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold">汇率换算</h3><button onclick="closeCalc()" class="text-gray-400 font-bold text-sm">关闭</button></div>
            <div class="space-y-4">
                <div class="p-4 bg-gray-50 rounded-2xl"><p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">日元 JPY</p><input id="calc-jpy" type="number" oninput="convert('jpy')" class="w-full bg-transparent text-3xl font-bold outline-none"></div>
                <div class="p-4 bg-gray-50 rounded-2xl"><p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">人民币 CNY</p><input id="calc-cny" type="number" oninput="convert('cny')" class="w-full bg-transparent text-3xl font-bold outline-none text-blue-600"></div>
            </div>
        </div>
    </div>

    <div id="phrase-panel" class="hidden fixed inset-0 z-50 flex items-end">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closePhrases()"></div>
        <div class="relative w-full bg-white rounded-t-[40px] p-8 modal-enter h-[80vh] flex flex-col pb-10">
            <div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold">常用口语</h3><button onclick="toggleAddPhrase()" class="text-sm font-bold bg-gray-100 px-4 py-2 rounded-full text-black">新增</button></div>
            <div id="add-phrase-box" class="hidden mb-6 p-4 bg-gray-50 rounded-3xl space-y-3"><input id="new-zh" type="text" placeholder="中文" class="w-full p-3 bg-white rounded-xl outline-none"><input id="new-jp" type="text" placeholder="日语" class="w-full p-3 bg-white rounded-xl outline-none"><input id="new-en" type="text" placeholder="注音" class="w-full p-3 bg-white rounded-xl outline-none"><button onclick="addNewPhrase()" class="w-full py-3 bg-black text-white rounded-xl font-bold">保存</button></div>
            <div id="phrase-list" class="flex-1 overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <div id="flash-modal" class="hidden fixed inset-0 z-[60] bg-black flex flex-col items-center justify-center p-10 text-center" onclick="this.classList.add('hidden')">
        <div class="modal-enter"><p id="f-en" class="text-gray-500 text-lg mb-4 font-bold uppercase"></p><h2 id="f-jp" class="text-white text-5xl font-bold mb-8"></h2><p id="f-zh" class="text-gray-400 text-xl"></p></div>
    </div>

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[110] bg-black/90 text-white px-8 py-3 rounded-full text-xs font-bold shadow-2xl">操作成功</div>

    <script>
        const RATE = 0.048;
        const STORAGE_KEY_ITINERARY = 'japan_2024_itinerary_v3';
        const STORAGE_KEY_PHRASES = 'japan_2024_phrases_v3';

        let itinerary = JSON.parse(localStorage.getItem(STORAGE_KEY_ITINERARY)) || [{ date: '4月18日', short: '4.18', day: '周四', loc: '未设定', events: [] }];
        let phrases = JSON.parse(localStorage.getItem(STORAGE_KEY_PHRASES)) || [];
        
        let isEditMode = false;
        let activeDayIndex = 0; 
        let activeEditEventIndex = null;
        let selectedColor = 'none';
        let selectedImageBase64 = null;
        let sortableInstance = null;

        function saveToLocal() {
            try {
                localStorage.setItem(STORAGE_KEY_ITINERARY, JSON.stringify(itinerary));
                localStorage.setItem(STORAGE_KEY_PHRASES, JSON.stringify(phrases));
            } catch (e) {
                showToast("内存溢出了！请删除部分大图");
            }
        }

        function render() {
            renderTabs();
            renderDayContent();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('date-tabs');
            tabsContainer.innerHTML = '';
            itinerary.forEach((day, index) => {
                const tab = document.createElement('div');
                tab.className = "relative flex-shrink-0 pt-3 pr-3"; 
                const tabBtn = document.createElement('div');
                tabBtn.onclick = () => { activeDayIndex = index; render(); };
                tabBtn.className = `px-6 py-3 rounded-2xl text-center cursor-pointer transition-all ${activeDayIndex === index ? 'tab-active' : 'bg-gray-50 text-gray-400 font-bold'}`;
                tabBtn.innerHTML = `<p class="text-[10px] font-bold">${day.day}</p><p class="text-lg font-bold">${day.short}</p>`;
                if (isEditMode) {
                    const del = document.createElement('button');
                    del.className = "absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-[12px] flex items-center justify-center shadow-lg z-10 border-2 border-white";
                    del.innerHTML = "×";
                    del.onclick = (e) => { e.stopPropagation(); deleteDay(index); };
                    tab.appendChild(del);
                }
                tab.appendChild(tabBtn);
                tabsContainer.appendChild(tab);
            });
            if (isEditMode) {
                const add = document.createElement('button');
                // mt-3 与 pt-3 抵消实现对齐
                add.className = "flex-shrink-0 w-12 h-12 mt-3 flex items-center justify-center bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl text-gray-300 text-2xl ml-2";
                add.innerHTML = "+";
                add.onclick = openAddDayModal;
                tabsContainer.appendChild(add);
            }
        }

        function renderDayContent() {
            const container = document.getElementById('day-content');
            if (itinerary.length === 0) return;
            const day = itinerary[activeDayIndex];
            container.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <div><h2 class="text-2xl font-bold">${day.date}</h2><p class="text-xs font-bold text-gray-400 mt-1">地点：<span id="loc-editable" oninput="updateLoc(this.innerText)" contenteditable="${isEditMode}">${day.loc}</span></p></div>
                    ${isEditMode ? `<button onclick="openEditor(${activeDayIndex})" class="w-10 h-10 flex items-center justify-center bg-black text-white rounded-xl font-bold text-xl">+</button>` : ''}
                </div>
                <div class="space-y-4 pb-12" id="events-list"></div>
            `;
            const list = document.getElementById('events-list');
            if (day.events.length === 0) {
                list.innerHTML = `<div class="py-10 text-center bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-100 font-bold text-gray-200">${isEditMode ? '新增项目' : '暂无计划'}</div>`;
            } else {
                list.innerHTML = day.events.map((ev, eIdx) => `
                    <div data-index="${eIdx}" onclick="openEditor(${activeDayIndex}, ${eIdx})" class="event-card relative flex items-center p-5 rounded-[2rem] transition-all active:scale-[0.98] high-${ev.color || 'none'} text-black shadow-sm border border-gray-50">
                        ${isEditMode ? `<div class="mr-3 text-gray-300 opacity-50 flex-shrink-0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>` : ''}
                        <div class="min-w-[65px] flex-shrink-0 text-lg font-bold">${ev.time}</div>
                        <div class="ml-4 flex-1 overflow-hidden text-left">
                            <div class="flex justify-between items-center mb-0.5"><p class="text-[10px] font-bold opacity-60 truncate">${ev.place}</p>${ev.cost > 0 ? `<span class="text-[9px] font-black bg-white/30 px-2 py-0.5 rounded-full">¥${ev.cost}</span>` : ''}</div>
                            <p class="text-base font-bold truncate">${ev.task}</p>
                            ${ev.image ? `<div class="mt-2"><img src="${ev.image}" class="w-16 h-16 rounded-lg object-cover border-2 border-white shadow-sm" onclick="viewFullImg(event, '${ev.image}')"></div>` : ''}
                        </div>
                    </div>
                `).join('');
                if (isEditMode) initSortable();
            }
        }

        // --- 图片处理大师 ---
        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // 核心压缩尺寸
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // 核心压缩算法：JPEG + 0.7 质量
                    selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    updateImgPreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateImgPreview() {
            const box = document.getElementById('img-preview-box');
            const status = document.getElementById('img-status-text');
            const del = document.getElementById('del-img-btn');
            if (selectedImageBase64) {
                box.innerHTML = `<img src="${selectedImageBase64}" class="w-full h-full object-cover">`;
                status.innerText = "已就绪";
                del.classList.remove('hidden');
            } else {
                box.innerHTML = `<span class="text-xs text-gray-400">🖼️</span>`;
                status.innerText = "尚未添加图片";
                del.classList.add('hidden');
            }
        }

        function clearSelectedImg() { selectedImageBase64 = null; updateImgPreview(); }
        function viewFullImg(e, src) { e.stopPropagation(); document.getElementById('viewer-content').src = src; document.getElementById('img-viewer').classList.remove('hidden'); }

        // --- 内存看板 ---
        function openMemoryStats() {
            const used = new Blob([JSON.stringify(localStorage)]).size;
            const mb = (used / 1024 / 1024).toFixed(2);
            const kb = (used / 1024).toFixed(1);
            const percent = Math.min((used / (5 * 1024 * 1024)) * 100, 100).toFixed(1);
            document.getElementById('memory-used').innerText = `${kb} KB / ${mb} MB`;
            document.getElementById('memory-bar').style.width = `${percent}%`;
            document.getElementById('memory-modal').classList.remove('hidden');
        }
        function closeMemoryStats() { document.getElementById('memory-modal').classList.add('hidden'); }

        // --- 核心 CRUD ---
        function openEditor(dIdx, eIdx = null) {
            if (!isEditMode) return; activeEditEventIndex = eIdx;
            const ev = eIdx !== null ? itinerary[dIdx].events[eIdx] : null;
            document.getElementById('in-time').value = ev ? ev.time : '';
            document.getElementById('in-place').value = ev ? ev.place : '';
            document.getElementById('in-task').value = ev ? ev.task : '';
            document.getElementById('in-cost').value = ev ? ev.cost : '';
            document.getElementById('in-cat').value = ev ? ev.cat : '';
            selectedImageBase64 = ev ? ev.image : null;
            updateImgPreview();
            selectColor(ev ? (ev.color || 'none') : 'none');
            document.getElementById('del-btn').classList.toggle('hidden', ev === null);
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function saveEvent() {
            const newEv = { 
                time: document.getElementById('in-time').value || '--:--', 
                place: document.getElementById('in-place').value || '未知', 
                task: document.getElementById('in-task').value || '计划', 
                cost: parseInt(document.getElementById('in-cost').value) || 0, 
                cat: document.getElementById('in-cat').value, 
                color: selectedColor,
                image: selectedImageBase64 
            };
            if (activeEditEventIndex !== null) itinerary[activeDayIndex].events[activeEditEventIndex] = newEv;
            else itinerary[activeDayIndex].events.push(newEv);
            saveToLocal(); closeModal(); render();
        }

        function initSortable() {
            const el = document.getElementById('events-list');
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = Sortable.create(el, {
                animation: 250, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', handle: '.event-card',
                onEnd: function (evt) {
                    const dayEvents = itinerary[activeDayIndex].events;
                    const movedItem = dayEvents.splice(evt.oldIndex, 1)[0];
                    dayEvents.splice(evt.newIndex, 0, movedItem);
                    saveToLocal(); renderDayContent();
                }
            });
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('edit-mode-btn').innerText = isEditMode ? '保存布局' : '进入编辑';
            document.getElementById('reset-btn').classList.toggle('hidden', !isEditMode);
            if (!isEditMode && sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
            render();
        }

        function executeReset() {
            if (document.getElementById('reset-verify-input').value.trim().toLowerCase() === 'ok') {
                itinerary = [{ date: '4月18日', short: '4.18', day: '周四', loc: '未设定', events: [] }];
                phrases = []; saveToLocal(); closeResetModal(); render();
            } else showToast("写 ok 呀");
        }

        function confirmAddDay() {
            const p = document.getElementById('new-day-picker').value;
            if (!p) return showToast("选个日子呗");
            const d = new Date(p);
            const w = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
            const newDay = { date: `${d.getMonth()+1}月${d.getDate()}日`, short: `${d.getMonth()+1}.${d.getDate()}`, day: w[d.getDay()], loc: document.getElementById('new-day-loc').value||'东京', events: [] };
            itinerary.push(newDay);
            itinerary.sort((a,b) => {
                const parse = (s) => { let x=s.split('.'); return new Date(2024, x[0]-1, x[1]) };
                return parse(a.short) - parse(b.short);
            });
            saveToLocal(); closeAddDayModal(); activeDayIndex = itinerary.findIndex(x => x.short === newDay.short); render();
        }

        // --- 工具函数 ---
        function convert(s) { const j = document.getElementById('calc-jpy'), c = document.getElementById('calc-cny'); if (s === 'jpy') c.value = j.value ? (j.value * RATE).toFixed(2) : ''; else j.value = c.value ? (c.value / RATE).toFixed(0) : ''; }
        function openCalc() { document.getElementById('calc-modal').classList.remove('hidden'); }
        function closeCalc() { document.getElementById('calc-modal').classList.add('hidden'); }
        function openDashboard() {
            let total = 0; let cat = {};
            itinerary.forEach(d => d.events.forEach(ev => { let c = (parseInt(ev.cost)||0)*RATE; total+=c; if(ev.cat) cat[ev.cat]=(cat[ev.cat]||0)+c; }));
            document.getElementById('total-cny-only').innerText = '¥ ' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('category-summary-cny').innerHTML = Object.keys(cat).map(k => `<div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl"><span class="font-bold">${k}</span><span class="font-black text-blue-600">¥ ${cat[k].toFixed(2)}</span></div>`).join('');
            document.getElementById('dashboard-modal').classList.remove('hidden');
        }
        function closeDashboard() { document.getElementById('dashboard-modal').classList.add('hidden'); }
        function openAddDayModal() { document.getElementById('add-day-modal').classList.remove('hidden'); }
        function closeAddDayModal() { document.getElementById('add-day-modal').classList.add('hidden'); }
        function openResetModal() { document.getElementById('reset-verify-input').value=''; document.getElementById('reset-confirm-modal').classList.remove('hidden'); }
        function closeResetModal() { document.getElementById('reset-confirm-modal').classList.add('hidden'); }
        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        function selectColor(c) { selectedColor=c; ['none','yellow','red','blue','green'].forEach(x => document.getElementById('col-'+x).classList.remove('ring-4','ring-black')); document.getElementById('col-'+c).classList.add('ring-4','ring-black'); }
        function deleteCurrentEvent() { itinerary[activeDayIndex].events.splice(activeEditEventIndex, 1); saveToLocal(); closeModal(); render(); }
        function deleteDay(idx) { if(confirm('全删了？')){ itinerary.splice(idx,1); activeDayIndex=Math.max(0, activeDayIndex-1); saveToLocal(); render(); } }
        function updateLoc(v) { itinerary[activeDayIndex].loc=v; saveToLocal(); }
        function openPhrases() { renderPhrases(); document.getElementById('phrase-panel').classList.remove('hidden'); }
        function closePhrases() { document.getElementById('phrase-panel').classList.add('hidden'); }
        function renderPhrases() {
            const list = document.getElementById('phrase-list');
            list.innerHTML = phrases.length === 0 ? '<p class="text-gray-300 text-center py-10 font-bold italic">点上方新增</p>' : 
                phrases.map((p, i) => `<div class="flex gap-2"><div onclick="showFlashcard('${p.zh}','${p.jp}','${p.en}')" class="flex-1 p-5 bg-gray-50 rounded-2xl flex justify-between items-center"><div><p class="text-[10px] text-gray-400 font-bold mb-1 text-left">${p.en}</p><p class="text-lg font-bold text-left text-black">${p.zh}</p></div><div class="text-2xl opacity-10">→</div></div><button onclick="deletePhrase(${i})" class="w-12 bg-red-50 text-red-500 rounded-2xl font-bold">🗑️</button></div>`).join('');
        }
        function toggleAddPhrase() { document.getElementById('add-phrase-box').classList.toggle('hidden'); }
        function addNewPhrase() { const z=document.getElementById('new-zh').value, j=document.getElementById('new-jp').value, e=document.getElementById('new-en').value; if(z&&j){ phrases.unshift({zh:z,jp:j,en:e||'USER'}); document.getElementById('new-zh').value=''; document.getElementById('new-jp').value=''; document.getElementById('new-en').value=''; saveToLocal(); toggleAddPhrase(); renderPhrases(); } }
        function deletePhrase(i) { phrases.splice(i,1); saveToLocal(); renderPhrases(); }
        function showFlashcard(z,j,e) { document.getElementById('f-zh').innerText=z; document.getElementById('f-jp').innerText=j; document.getElementById('f-en').innerText=e; document.getElementById('flash-modal').classList.remove('hidden'); }
        function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 1500); }

        window.onload = render;
    </script>
</body>
</html>
